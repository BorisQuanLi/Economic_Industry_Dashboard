name: CI/CD Pipeline

on:
  push:
    # Trigger on main, develop, and any branch starting with 'feat/pyspark-'
    branches: [ main, develop, 'feat/pyspark-*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.11']
        service: [flask_backend, fastapi_backend, etl_service]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Only run if a pom.xml exists in the service directory
      - name: Set up Java for Analytics
        if: hashFiles(format('{0}/pom.xml', matrix.service)) != ''
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Polyglot Tests
        run: make test SERVICE=${{ matrix.service }}

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install dependencies
        working-directory: ./${{ matrix.service }}
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        working-directory: ./${{ matrix.service }}
        run: pytest --cov --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}

      - name: Cleanup
        if: always()
        run: docker compose down

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check .

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker images
      run: docker-compose build

    - name: Run integration tests
      run: |
        docker-compose up -d
        sleep 10
        curl -f http://localhost:8000/health || exit 1
        docker-compose down
