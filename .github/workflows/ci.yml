name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'feat/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
        service: [fastapi_backend, etl_service]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Java for Analytics
        if: hashFiles(format('{0}/pom.xml', matrix.service)) != ''
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        working-directory: ./${{ matrix.service }}
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Polyglot Tests
        working-directory: ./${{ matrix.service }}
        run: pytest --cov --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}

      - name: Cleanup
        if: always()
        run: docker compose down

  test-kotlin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./kotlin-data-agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('kotlin-data-agent/build.gradle.kts') }}

      - name: Run Kotlin tests
        run: gradle test --no-daemon

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check .

  docker:
    runs-on: ubuntu-latest
    needs: [test, test-kotlin, lint]
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker images
      run: docker compose build

    - name: Run integration tests
      env:
        # Non-secret defaults for ephemeral CI containers.
        DB_USER: postgres
        DB_PASS: postgres
        DB_NAME: investment_analysis
        # Prevent accidental dependency on external APIs in CI.
        FMP_API_KEY: ""
      run: |
        docker compose up -d
        sleep 10
        curl -f http://localhost:8000/health
        curl -f http://localhost:8090/health

    - name: Dump compose logs (on failure)
      if: failure()
      run: |
        docker compose ps
        echo "---- postgres logs ----"
        docker compose logs --no-color postgres || true
        echo "---- fastapi_backend logs ----"
        docker compose logs --no-color fastapi_backend || true
        echo "---- etl_service logs ----"
        docker compose logs --no-color etl_service || true
        echo "---- kotlin-data-agent logs ----"
        docker compose logs --no-color kotlin-data-agent || true
        docker compose config

    - name: Cleanup
      if: always()
      run: docker compose down --volumes --remove-orphans
