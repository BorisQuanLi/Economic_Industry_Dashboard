services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - fastapi_backend
    environment:
      FRONTEND_ENV_VAR: "example_value"
      BACKEND_HOST: "fastapi_backend"
      BACKEND_PORT: "8000"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  fastapi_backend:
    build:
      context: ./fastapi_backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: "postgres"
      DB_NAME: "${DB_NAME}"
      DB_USER: "${DB_USER}"
      DB_PASS: "${DB_PASS}"
      DB_PORT: "5432"
      REDIS_URL: "redis://redis:6379/0"

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASS}"
      POSTGRES_DB: "${DB_NAME}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${DB_USER}:${DB_PASS}@postgres:5432/airflow"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "${AIRFLOW_SECRET_KEY:-changeme}"
    command: >
      bash -c "airflow db migrate &&
               airflow users create --username admin --password admin --firstname Air --lastname Flow --role Admin --email admin@example.com || true &&
               airflow webserver & airflow scheduler"

  etl_service:
    build:
      context: ./etl_service
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: "${DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASS:-postgres}"
      POSTGRES_DB: "${DB_NAME:-investment_analysis}"
      DB_USER: "${DB_USER:-postgres}"
      DB_PASS: "${DB_PASS:-postgres}"
      DB_NAME: "${DB_NAME:-investment_analysis}"
      DB_HOST: "postgres"
      FMP_API_KEY: "${FMP_API_KEY}"
    volumes:
      - etl_data:/app/data
    command: ["python", "etl_service/pipelines/standard_pipeline.py", "--init-db", "--companies-only"]

  kotlin-data-agent:
    build:
      context: ./kotlin-data-agent
      dockerfile: Dockerfile
    ports:
      - "8090:8080"
    depends_on:
      - fastapi_backend
    environment:
      FASTAPI_BASE_URL: "http://fastapi_backend:8000"

volumes:
  postgres_data:
  etl_data:
